<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon.png" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
        }

        #video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
        }

        .profile-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5),
                        0 0 40px rgba(0, 255, 255, 0.3),
                        0 0 80px rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(0, 255, 255, 0.5);
            animation: neonGlow 2s infinite alternate;
        }

        @keyframes neonGlow {
            from {
                box-shadow: 0 0 20px rgba(0, 255, 255, 0.5),
                            0 0 40px rgba(0, 255, 255, 0.3),
                            0 0 80px rgba(0, 255, 255, 0.2);
                border-color: rgba(0, 255, 255, 0.5);
            }
            to {
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.7),
                            0 0 60px rgba(0, 255, 255, 0.5),
                            0 0 120px rgba(0, 255, 255, 0.3);
                border-color: rgba(0, 255, 255, 0.8);
            }
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 255, 255, 0.7);
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .bio {
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 255, 255, 0.5);
        }

        .social-btn:hover {
            background: rgba(0, 255, 255, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }

        .visitor-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .counter-icon {
            margin-right: 10px;
            color: cyan;
        }

        .counter-number {
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
        }

        @media (max-width: 768px) {
            .profile-card {
                padding: 20px;
                width: 95%;
            }
            
            .avatar {
                width: 120px;
                height: 120px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .bio {
                font-size: 1rem;
            }
            
            .social-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
    <script>
        function checkDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const video = document.getElementById('video-bg');
            const source = document.getElementById('video-source');
    
            if (isMobile) {
                source.src = "video.mp4";
            } else {
                source.src = "video1.mp4";
            }
    
            video.load(); 
        }
    
        function updateVisitorCounter() {
            let count = localStorage.getItem('visitorCount');
            count = count ? parseInt(count) + 1 : 1;
            localStorage.setItem('visitorCount', count);
            document.getElementById('visitor-count').textContent = count;
        }
    
        window.onload = function () {
            checkDevice();
            updateVisitorCounter();
        };
    </script>
    
</head>
<body>
    <video autoplay muted loop id="video-bg" playsinline>
        <source src="video1.mp4" type="video/mp4" id="video-source">
    </video>
    

    <div class="profile-card">
        <img src="photo.jpg" alt="Моя аватарка" class="avatar">
        <h1>ᴧᴇᴧиᴋ</h1>
        <div class="bio" style="white-space: pre-wrap; text-align: left;">
            ID: <code>615061902</code>  
            USERNAME: @iammfl  
              
            Active: 7–8 hours on weekdays / 3–4 hours on holidays  
            Defs: I don't have defs  
              
            Wallets:  
            - YouMoney: <code>5599002070934957</code>  
            - KASPI: <code>4400430368612484</code>  
            - CB: <a href="https://t.me/send?start=IVcbws84XJzZ">счет</a>
            </div>
            
        <div class="social-links">
            <div class="social-links">
                <a href="https://t.me/iammfl" class="social-btn" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
                <a href="https://github.com/loliksudoc" class="social-btn" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://wa.me/77786926590" class="social-btn" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            </div>
            
        </div>
    </div>

    <div class="visitor-counter">
        <span class="counter-icon">👁️</span>
        <span class="counter-number" id="visitor-count">0</span>
    </div>

</body>
</html>
